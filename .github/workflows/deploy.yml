name: Deploy to GitHub Pages

# Publishes the built site to GitHub Pages.
#
# GitHub Pages requires the repository to be PUBLIC (or a paid plan for private
# Pages). This runs on manual trigger only so it doesn't fail on every push
# while the repo is private. To enable automatic deploys: make the repo public,
# set Settings → Pages → Source = "GitHub Actions", and uncomment the `push`
# trigger below.

on:
  workflow_dispatch:
  # push:
  #   branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # Served from https://<user>.github.io/ifdm-toolkit/
          VITE_BASE: /ifdm-toolkit/
      # SPA fallback: serve index.html for deep links like /tools/tvm
      - run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
