name: Deploy to GitHub Pages

# Builds the site and publishes it to GitHub Pages on every push to main.
# Requires Settings → Pages → Source = "GitHub Actions" (public repo, or a plan
# that allows private Pages).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # Served from https://<user>.github.io/ifdm-toolkit/
          VITE_BASE: /ifdm-toolkit/
      # SPA fallback: serve index.html for deep links like /tools/tvm
      - run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
